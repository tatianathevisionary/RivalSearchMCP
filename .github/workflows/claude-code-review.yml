name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Claude Code
      run: |
        npm install -g @anthropic-ai/claude-code

    - name: Get Changed Files
      id: changed-files
      uses: tj-actions/changed-files@v41
      with:
        files: |
          src/**/*.py
          tests/**/*.py

    - name: Run Claude Code Review
      if: steps.changed-files.outputs.any_changed == 'true'
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # Create review prompt
        cat << 'EOF' > review-prompt.md
        Review the following code changes for:

        ## Security
        - [ ] No SQL injection vulnerabilities
        - [ ] No command injection
        - [ ] Input validation present
        - [ ] No hardcoded secrets

        ## Code Quality
        - [ ] DRY principle followed
        - [ ] Clear function responsibilities
        - [ ] Type hints complete
        - [ ] Docstrings present

        ## Performance
        - [ ] Async/await used correctly
        - [ ] No blocking I/O
        - [ ] Efficient algorithms

        ## Testing
        - [ ] Tests included for new code
        - [ ] Edge cases covered

        Provide specific feedback with file:line references.
        EOF

        # Get diff and pipe to Claude
        git diff ${{ github.event.pull_request.base.sha }}...${{ github.sha }} > changes.diff

        # Run Claude review (placeholder - actual implementation varies)
        echo "Claude review would run here with changes.diff"

    - name: Post Review Comment
      if: steps.changed-files.outputs.any_changed == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          // Read Claude's review output
          let reviewContent = 'Claude Code Review completed. See workflow logs for details.';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🤖 Claude Code Review\n\n${reviewContent}\n\n---\n*Automated review by Claude Code*`
          });
