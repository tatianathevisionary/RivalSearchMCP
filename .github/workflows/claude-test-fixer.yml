name: Claude Test Fixer

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to fix tests on'
        required: true
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-tests:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch' }}

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_branch || github.event.inputs.branch }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run Tests and Capture Failures
      id: test-run
      continue-on-error: true
      run: |
        pytest --tb=long 2>&1 | tee test-output.txt
        echo "exit_code=$?" >> $GITHUB_OUTPUT

    - name: Check for Test Failures
      id: check-failures
      run: |
        if grep -q "FAILED\|ERROR" test-output.txt; then
          echo "has_failures=true" >> $GITHUB_OUTPUT
          grep -E "^(FAILED|ERROR)" test-output.txt > failed-tests.txt || true
        else
          echo "has_failures=false" >> $GITHUB_OUTPUT
        fi

    - name: Install Claude Code
      if: steps.check-failures.outputs.has_failures == 'true'
      run: |
        npm install -g @anthropic-ai/claude-code

    - name: Analyze and Fix Tests
      if: steps.check-failures.outputs.has_failures == 'true'
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # Create fix prompt
        cat << 'EOF' > fix-prompt.md
        The following tests are failing. Analyze the errors and provide fixes.

        For each failing test:
        1. Identify the root cause
        2. Determine if it's a test issue or code issue
        3. Provide the minimal fix

        Do not change test assertions unless they are incorrect.
        Prefer fixing the implementation over fixing tests.
        EOF

        # Analyze failures (placeholder)
        echo "Claude would analyze test-output.txt and generate fixes"

    - name: Create Fix PR
      if: steps.check-failures.outputs.has_failures == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "fix: Auto-fix failing tests via Claude"
        title: "[Auto] Fix failing tests"
        body: |
          ## 🤖 Automated Test Fix

          This PR contains automated fixes for failing tests detected by CI.

          ### Changed Files
          See commit diff for details.

          ### Verification
          - [ ] Tests pass locally
          - [ ] No regressions introduced

          ---
          *Generated by Claude Test Fixer*
        branch: auto-fix/tests-${{ github.run_number }}
        delete-branch: true
