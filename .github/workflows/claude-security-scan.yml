name: Claude Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit semgrep

    - name: Run Bandit
      id: bandit
      continue-on-error: true
      run: |
        bandit -r src/ -f json -o bandit-report.json
        bandit -r src/ -f txt -o bandit-report.txt

    - name: Run Safety Check
      id: safety
      continue-on-error: true
      run: |
        pip freeze | safety check --stdin --json > safety-report.json || true
        pip freeze | safety check --stdin > safety-report.txt || true

    - name: Run pip-audit
      id: pip-audit
      continue-on-error: true
      run: |
        pip-audit --format json > pip-audit-report.json || true
        pip-audit > pip-audit-report.txt || true

    - name: Run Semgrep
      id: semgrep
      continue-on-error: true
      run: |
        semgrep --config=auto src/ --json > semgrep-report.json || true
        semgrep --config=auto src/ > semgrep-report.txt || true

    - name: Install Claude Code
      run: |
        npm install -g @anthropic-ai/claude-code

    - name: Claude Security Analysis
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # Create analysis prompt
        cat << 'EOF' > security-prompt.md
        Analyze the security scan reports and provide:

        1. **Critical Issues** (must fix immediately)
           - Severity: Critical/High
           - Exploitability assessment
           - Specific remediation steps

        2. **Warnings** (should fix soon)
           - Severity: Medium
           - Risk assessment
           - Remediation guidance

        3. **Low Priority** (consider fixing)
           - Severity: Low
           - Context for decision

        4. **False Positives**
           - Explain why they're not issues
           - Suggest how to suppress if needed

        Format findings with file:line references.
        EOF

        # Claude would analyze all reports
        echo "Claude security analysis would run here"

    - name: Generate Security Report
      run: |
        cat << 'EOF' > security-summary.md
        # Security Scan Summary

        ## Scan Results

        | Tool | Status | Issues |
        |------|--------|--------|
        | Bandit | ${{ steps.bandit.outcome }} | See report |
        | Safety | ${{ steps.safety.outcome }} | See report |
        | pip-audit | ${{ steps.pip-audit.outcome }} | See report |
        | Semgrep | ${{ steps.semgrep.outcome }} | See report |

        ## Reports

        See workflow artifacts for detailed reports.
        EOF

    - name: Upload Security Reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.*
          safety-report.*
          pip-audit-report.*
          semgrep-report.*
          security-summary.md

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('security-summary.md', 'utf8');

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🔒 Security Scan Results\n\n${summary}\n\n---\n*Automated scan by Claude Security*`
          });

    - name: Fail on Critical Issues
      run: |
        # Check for critical issues in bandit
        if grep -q '"severity": "HIGH"' bandit-report.json 2>/dev/null; then
          echo "::error::High severity security issues found"
          exit 1
        fi
