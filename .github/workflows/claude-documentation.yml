name: Claude Documentation

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.py'
      - 'server.py'
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.py'
      - 'server.py'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,docs]

    - name: Get Changed Python Files
      id: changed-files
      uses: tj-actions/changed-files@v41
      with:
        files: |
          src/**/*.py
          server.py

    - name: Install Claude Code
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        npm install -g @anthropic-ai/claude-code

    - name: Extract Docstrings and Generate Docs
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        # Generate API documentation from docstrings
        cat << 'SCRIPT' > generate_docs.py
        import ast
        import os
        from pathlib import Path

        def extract_docstrings(filepath):
            with open(filepath, 'r') as f:
                tree = ast.parse(f.read())

            docs = []
            for node in ast.walk(tree):
                if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
                    if ast.get_docstring(node):
                        docs.append({
                            'name': node.name,
                            'type': type(node).__name__,
                            'docstring': ast.get_docstring(node),
                            'lineno': node.lineno
                        })
            return docs

        # Process changed files
        changed_files = """${{ steps.changed-files.outputs.all_changed_files }}""".split()

        for filepath in changed_files:
            if filepath.endswith('.py') and os.path.exists(filepath):
                docs = extract_docstrings(filepath)
                print(f"\n## {filepath}\n")
                for doc in docs:
                    print(f"### {doc['type']}: {doc['name']} (line {doc['lineno']})")
                    print(f"\n{doc['docstring']}\n")
        SCRIPT

        python generate_docs.py > docs-update.md

    - name: Update Documentation
      if: steps.changed-files.outputs.any_changed == 'true'
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # Claude would update docs/developers/api-reference.md based on docs-update.md
        echo "Documentation update would be generated here"

    - name: Build Docs
      run: mkdocs build

    - name: Create Documentation PR
      if: steps.changed-files.outputs.any_changed == 'true' && github.event_name == 'push'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "docs: Auto-update documentation"
        title: "[Auto] Update documentation for code changes"
        body: |
          ## 📚 Documentation Update

          This PR updates documentation to reflect recent code changes.

          ### Updated Sections
          - API Reference
          - Tool documentation
          - Schema documentation

          ---
          *Generated by Claude Documentation*
        branch: auto-docs/update-${{ github.run_number }}
        delete-branch: true
