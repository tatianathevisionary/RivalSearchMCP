        <p>Rival Search MCP is an open-source Model Context Protocol (MCP) server that gives AI assistants like Claude, Cursor, and VS Code real-time web research capabilities. It provides 10 specialized tools across 20+ data sources with zero API keys required.</p>

        <h2>10 Research Tools</h2>
        <h3>Search Intelligence</h3>
        <ul>
          <li><strong>Web Search</strong> — Multi-engine search across DuckDuckGo, Yahoo &amp; Wikipedia with automatic fallbacks</li>
          <li><strong>Social Search</strong> — Search Reddit, Hacker News, Dev.to, ProductHunt &amp; Medium without authentication</li>
          <li><strong>News Aggregation</strong> — Real-time news from Google News RSS, DuckDuckGo News &amp; Yahoo News</li>
          <li><strong>GitHub Search</strong> — Search GitHub public repositories</li>
          <li><strong>Website Mapper</strong> — Intelligent website crawling with research, documentation &amp; mapping modes</li>
        </ul>
        <h3>Content Analysis</h3>
        <ul>
          <li><strong>Content Operations</strong> — Retrieve, stream, analyze &amp; extract content from any URL</li>
          <li><strong>Research Topic</strong> — End-to-end research workflow with source discovery</li>
          <li><strong>Document Analysis</strong> — Extract text from PDF, Word, Text &amp; Images with OCR</li>
        </ul>
        <h3>Deep Research</h3>
        <ul>
          <li><strong>Scientific Research</strong> — arXiv, Semantic Scholar, Kaggle &amp; HuggingFace</li>
          <li><strong>Research Agent</strong> — Autonomous AI agent generating comprehensive reports</li>
        </ul>

        <h2>Quick Start</h2>
        <p>Add this URL to any MCP client: <code>https://RivalSearchMCP.fastmcp.app/mcp</code></p>
